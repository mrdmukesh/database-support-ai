name: Deploy To Azure Container App

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: legacydb-support-copilot
  REGISTRY: ghcr.io
  AZURE_RESOURCE_GROUP: rg-database-support-ai-dev
  AZURE_LOCATION: centralindia
  AZURE_CONTAINER_APP_NAME: ca-database-support-ai-dev
  AZURE_CONTAINER_ENV_NAME: cae-database-support-ai-dev
  CONTAINER_PORT: "8000"
  AZURE_POSTGRES_SERVER_PREFIX: pg-dsai-dev
  AZURE_POSTGRES_DATABASE: database_support_ai
  AZURE_POSTGRES_ADMIN_USER: appadmin
  AZURE_STORAGE_ACCOUNT_PREFIX: stdsai
  AZURE_STORAGE_CONTAINER: app-artifacts
  AZURE_KEY_VAULT_PREFIX: kv-dsai-dev
  LLM_MODEL: gpt-4.1-mini
  OPENAI_BASE_URL: https://api.openai.com/v1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: azure-low-cost
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Azure infrastructure exists
        uses: azure/cli@v2
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          inlineScript: |
            set -euo pipefail

            az provider register --namespace Microsoft.App --wait
            az provider register --namespace Microsoft.OperationalInsights --wait
            az provider register --namespace Microsoft.DBforPostgreSQL --wait
            az provider register --namespace Microsoft.Storage --wait
            az provider register --namespace Microsoft.KeyVault --wait

            az group create \
              --name "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION"

            SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
            RESOURCE_SUFFIX="$(echo "$SUBSCRIPTION_ID" | tr -d '-' | cut -c1-8)"
            POSTGRES_SERVER="${AZURE_POSTGRES_SERVER_PREFIX}-${RESOURCE_SUFFIX}"
            STORAGE_ACCOUNT="$(echo "${AZURE_STORAGE_ACCOUNT_PREFIX}${RESOURCE_SUFFIX}" | tr '[:upper:]' '[:lower:]' | cut -c1-24)"
            KEY_VAULT_NAME="${AZURE_KEY_VAULT_PREFIX}-${RESOURCE_SUFFIX}"

            {
              echo "AZURE_POSTGRES_SERVER=$POSTGRES_SERVER"
              echo "AZURE_STORAGE_ACCOUNT=$STORAGE_ACCOUNT"
              echo "AZURE_KEY_VAULT_NAME=$KEY_VAULT_NAME"
            } >> "$GITHUB_ENV"

            if ! az containerapp env show \
              --name "$AZURE_CONTAINER_ENV_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
              az containerapp env create \
                --name "$AZURE_CONTAINER_ENV_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --location "$AZURE_LOCATION"
            fi

            if ! az storage account show \
              --name "$STORAGE_ACCOUNT" \
              --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
              az storage account create \
                --name "$STORAGE_ACCOUNT" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --location "$AZURE_LOCATION" \
                --sku Standard_LRS \
                --kind StorageV2 \
                --allow-blob-public-access false \
                --min-tls-version TLS1_2
            fi

            STORAGE_CONNECTION_STRING="$(az storage account show-connection-string \
              --name "$STORAGE_ACCOUNT" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query connectionString \
              --output tsv)"
            az storage container create \
              --name "$AZURE_STORAGE_CONTAINER" \
              --connection-string "$STORAGE_CONNECTION_STRING" \
              --auth-mode key >/dev/null

            if ! az keyvault show \
              --name "$KEY_VAULT_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
              az keyvault create \
                --name "$KEY_VAULT_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --location "$AZURE_LOCATION" \
                --sku standard \
                --enable-rbac-authorization false
            fi

            AZURE_LOGIN_NAME="$(az account show --query user.name -o tsv)"
            AZURE_LOGIN_TYPE="$(az account show --query user.type -o tsv)"
            if [ "$AZURE_LOGIN_TYPE" = "servicePrincipal" ]; then
              az keyvault set-policy \
                --name "$KEY_VAULT_NAME" \
                --spn "$AZURE_LOGIN_NAME" \
                --secret-permissions get list set >/dev/null
            else
              az keyvault set-policy \
                --name "$KEY_VAULT_NAME" \
                --upn "$AZURE_LOGIN_NAME" \
                --secret-permissions get list set >/dev/null
            fi

            az keyvault secret set \
              --vault-name "$KEY_VAULT_NAME" \
              --name azure-storage-connection-string \
              --value "$STORAGE_CONNECTION_STRING" >/dev/null

            if ! az postgres flexible-server show \
              --name "$POSTGRES_SERVER" \
              --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
              if [ -z "${POSTGRES_ADMIN_PASSWORD:-}" ]; then
                echo "::error::AZURE_POSTGRES_ADMIN_PASSWORD GitHub secret is required to create PostgreSQL after the resource group is deleted."
                exit 1
              fi
              az postgres flexible-server create \
                --name "$POSTGRES_SERVER" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --location "$AZURE_LOCATION" \
                --admin-user "$AZURE_POSTGRES_ADMIN_USER" \
                --admin-password "$POSTGRES_ADMIN_PASSWORD" \
                --sku-name Standard_B1ms \
                --tier Burstable \
                --storage-size 32 \
                --version 16 \
                --public-access 0.0.0.0
            fi

            POSTGRES_STATE="$(az postgres flexible-server show \
              --name "$POSTGRES_SERVER" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query state \
              --output tsv)"
            if [ "$POSTGRES_STATE" = "Stopped" ]; then
              echo "PostgreSQL server $POSTGRES_SERVER is stopped. Starting it for deployment..."
              az postgres flexible-server start \
                --name "$POSTGRES_SERVER" \
                --resource-group "$AZURE_RESOURCE_GROUP"
            fi
            for attempt in $(seq 1 30); do
              POSTGRES_STATE="$(az postgres flexible-server show \
                --name "$POSTGRES_SERVER" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --query state \
                --output tsv)"
              if [ "$POSTGRES_STATE" = "Ready" ]; then
                break
              fi
              echo "Waiting for PostgreSQL server to become Ready. Current state: $POSTGRES_STATE"
              sleep 20
            done
            if [ "$POSTGRES_STATE" != "Ready" ]; then
              echo "::error::PostgreSQL server $POSTGRES_SERVER did not become Ready. Current state: $POSTGRES_STATE"
              exit 1
            fi

            az postgres flexible-server firewall-rule create \
              --name AllowAzureContainerAppsDev \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server-name "$POSTGRES_SERVER" \
              --start-ip-address 0.0.0.0 \
              --end-ip-address 255.255.255.255 >/dev/null
            az postgres flexible-server db create \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server-name "$POSTGRES_SERVER" \
              --name "$AZURE_POSTGRES_DATABASE" >/dev/null || true

            DATABASE_URL="$(az keyvault secret show \
              --vault-name "$KEY_VAULT_NAME" \
              --name database-url \
              --query value \
              --output tsv 2>/dev/null || true)"
            if [ -z "$DATABASE_URL" ]; then
              if [ -z "${POSTGRES_ADMIN_PASSWORD:-}" ]; then
                echo "::error::database-url secret is missing in Key Vault and AZURE_POSTGRES_ADMIN_PASSWORD was not provided."
                exit 1
              fi
              ENCODED_POSTGRES_PASSWORD="$(python -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_ADMIN_PASSWORD"], safe=""))')"
              DATABASE_URL="postgresql+psycopg://${AZURE_POSTGRES_ADMIN_USER}:${ENCODED_POSTGRES_PASSWORD}@${POSTGRES_SERVER}.postgres.database.azure.com:5432/${AZURE_POSTGRES_DATABASE}?sslmode=require"
              az keyvault secret set \
                --vault-name "$KEY_VAULT_NAME" \
                --name database-url \
                --value "$DATABASE_URL" >/dev/null
            fi

            if ! az keyvault secret show \
              --vault-name "$KEY_VAULT_NAME" \
              --name jwt-secret >/dev/null 2>&1; then
              az keyvault secret set \
                --vault-name "$KEY_VAULT_NAME" \
                --name jwt-secret \
                --value "$(openssl rand -base64 48 | tr -d '\n')" >/dev/null
            fi

            if [ -n "${OPENAI_API_KEY:-}" ]; then
              az keyvault secret set \
                --vault-name "$KEY_VAULT_NAME" \
                --name openai-api-key \
                --value "$OPENAI_API_KEY" >/dev/null
            fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE="${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}:${{ github.sha }}"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Create or update Container App
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            DATABASE_URL="$(az keyvault secret show \
              --vault-name "$AZURE_KEY_VAULT_NAME" \
              --name database-url \
              --query value \
              --output tsv)"
            JWT_SECRET="$(az keyvault secret show \
              --vault-name "$AZURE_KEY_VAULT_NAME" \
              --name jwt-secret \
              --query value \
              --output tsv)"
            STORAGE_CONNECTION_STRING="$(az keyvault secret show \
              --vault-name "$AZURE_KEY_VAULT_NAME" \
              --name azure-storage-connection-string \
              --query value \
              --output tsv)"
            OPENAI_API_KEY_VALUE="$(az keyvault secret show \
              --vault-name "$AZURE_KEY_VAULT_NAME" \
              --name openai-api-key \
              --query value \
              --output tsv 2>/dev/null || true)"
            OPENAI_SECRET_ARGS=()
            OPENAI_ENV_ARGS=("AI_REASONING_ENABLED=false" "LLM_ENABLED=false")
            if [ -n "$OPENAI_API_KEY_VALUE" ]; then
              OPENAI_SECRET_ARGS=("openai-api-key=$OPENAI_API_KEY_VALUE")
              OPENAI_ENV_ARGS=(
                "AI_REASONING_ENABLED=true"
                "LLM_ENABLED=true"
                "LLM_PROVIDER=openai"
                "LLM_MODEL=$LLM_MODEL"
                "OPENAI_BASE_URL=$OPENAI_BASE_URL"
                "OPENAI_API_KEY=secretref:openai-api-key"
              )
            fi

            if az containerapp show \
              --name "$AZURE_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
              az containerapp secret set \
                --name "$AZURE_CONTAINER_APP_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --secrets \
                  "database-url=$DATABASE_URL" \
                  "jwt-secret=$JWT_SECRET" \
                  "storage-connection-string=$STORAGE_CONNECTION_STRING" \
                  "${OPENAI_SECRET_ARGS[@]}"
              az containerapp update \
                --name "$AZURE_CONTAINER_APP_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --image "$IMAGE" \
                --set-env-vars \
                  "APP_ENV=production" \
                  "DATABASE_URL=secretref:database-url" \
                  "JWT_SECRET=secretref:jwt-secret" \
                  "STORAGE_BACKEND=azure_blob" \
                  "AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection-string" \
                  "AZURE_STORAGE_CONTAINER=$AZURE_STORAGE_CONTAINER" \
                  "KNOWLEDGE_RETRIEVER_BACKEND=sqlite" \
                  "VERIFICATION_AGENT_ENABLED=true" \
                  "${OPENAI_ENV_ARGS[@]}"
            else
              az containerapp create \
                --name "$AZURE_CONTAINER_APP_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --environment "$AZURE_CONTAINER_ENV_NAME" \
                --image "$IMAGE" \
                --target-port "$CONTAINER_PORT" \
                --ingress external \
                --min-replicas 0 \
                --max-replicas 1 \
                --cpu 0.25 \
                --memory 0.5Gi \
                --secrets \
                  "database-url=$DATABASE_URL" \
                  "jwt-secret=$JWT_SECRET" \
                  "storage-connection-string=$STORAGE_CONNECTION_STRING" \
                  "${OPENAI_SECRET_ARGS[@]}" \
                --env-vars \
                  "APP_ENV=production" \
                  "DATABASE_URL=secretref:database-url" \
                  "JWT_SECRET=secretref:jwt-secret" \
                  "STORAGE_BACKEND=azure_blob" \
                  "AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection-string" \
                  "AZURE_STORAGE_CONTAINER=$AZURE_STORAGE_CONTAINER" \
                  "KNOWLEDGE_RETRIEVER_BACKEND=sqlite" \
                  "VERIFICATION_AGENT_ENABLED=true" \
                  "${OPENAI_ENV_ARGS[@]}"
            fi

      - name: Show app URL
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp show \
              --name "$AZURE_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "properties.configuration.ingress.fqdn" \
              --output tsv
