name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,dev]"

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./ci.db
          JWT_SECRET: ci-only-not-production
          KNOWLEDGE_RETRIEVER_BACKEND: sqlite
        run: python -m pytest

      - name: Upload payroll RCA regression summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payroll-rca-regression-summary
          path: reports/payroll_rca_regression_summary.json
          if-no-files-found: error

      - name: Build Docker image
        run: docker build -t legacydb-support-copilot:ci .
